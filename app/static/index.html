<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.title">ApiHub</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/i18n.js"></script>
</head>
<body>
<div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-mark">◈</div>
            <div class="logo-text">ApiHub<span>/ platform</span></div>
        </div>

        <div>
            <div class="nav-label" data-i18n="nav.main">Main</div>
            <div class="nav-item active" data-page="dashboard">
                <span class="nav-icon">◆</span> <span data-i18n="nav.dashboard">Dashboard</span>
            </div>
        </div>

        <div>
            <div class="nav-label" data-i18n="nav.services_title">Services</div>
            <div class="service-list" id="sidebar-services">
                <div class="service-item"><span class="loading" data-i18n="loading">Loading…</span></div>
            </div>
        </div>

    </aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="page-title-area">
                <div class="page-label" data-i18n="app.title">ApiHub</div>
                <h1 class="page-title" id="page-title"><span data-i18n="nav.dashboard">Dashboard</span></h1>
                <div class="page-meta" id="page-meta">—</div>
            </div>
            <div class="top-actions">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="en" onclick="switchLocale('en')">EN</button>
                    <button class="lang-btn" data-lang="ru" onclick="switchLocale('ru')">RU</button>
                </div>
                <button class="btn" id="btn-refresh" data-i18n="btn.refresh">↻ Refresh</button>
                <button class="btn btn-primary" id="btn-check" data-i18n="btn.check">+ New Check</button>
            </div>
        </div>

        <!-- Error Banner -->
        <div class="error-banner" id="error-banner"></div>

        <!-- Stats -->
        <div class="stats" id="stats-row">
            <div class="stat">
                <div class="stat-accent indigo"></div>
                <div class="stat-label" data-i18n="stats.services">Services</div>
                <div class="stat-value" id="stat-services">—</div>
            </div>
            <div class="stat">
                <div class="stat-accent orange"></div>
                <div class="stat-label" data-i18n="stats.dependencies">Dependencies</div>
                <div class="stat-value" id="stat-deps">—</div>
                <div class="stat-change up" id="stat-deps-sub"></div>
            </div>
            <div class="stat">
                <div class="stat-accent green"></div>
                <div class="stat-label" data-i18n="stats.compatible">Compatible</div>
                <div class="stat-value" id="stat-ok">—</div>
                <div class="stat-change up" id="stat-ok-sub"></div>
            </div>
            <div class="stat">
                <div class="stat-accent rose"></div>
                <div class="stat-label" data-i18n="stats.breaking">Breaking</div>
                <div class="stat-value" id="stat-breaking">—</div>
                <div class="stat-change down" id="stat-breaking-sub"></div>
            </div>
        </div>

        <!-- Graph -->
        <div class="graph-card">
            <div class="graph-header">
                <h2><span data-i18n="graph.title">Services</span></h2>
            </div>
            <div class="graph-body">
                <div id="graph-container"></div>
            </div>
            <div class="legend" id="graph-legend"></div>
        </div>

        <!-- Details panel (hidden by default) -->
        <div class="details-panel" id="details-panel">
            <div class="details-close" id="details-close">✕</div>
            <div id="details-info"></div>
        </div>

        <!-- Bottom Grid -->
        <div class="bottom-grid">

            <!-- Dependencies -->
            <div class="card">
                <div class="card-header">
                    <h3><span data-i18n="nav.dependencies">Dependencies</span></h3>
                    <span class="card-count" id="deps-count">—</span>
                </div>
                <div id="deps-list">
                    <div class="empty-state" data-i18n="loading">Loading…</div>
                </div>
            </div>

            <!-- Recent Checks -->
            <div class="card">
                <div class="card-header">
                    <h3><span data-i18n="checks.title">Recent Checks</span></h3>
                    <span class="card-count" id="checks-count">—</span>
                </div>
                <div class="checks-grid" id="checks-body">
                    <div class="empty-state" data-i18n="checks.empty">No checks run yet.</div>
                </div>
            </div>

        </div>
    </main>
</div>

    <!-- Check Modal -->
    <div class="modal-overlay" id="check-modal">
        <div class="modal modal-wide">
            <h3><span data-i18n="check.title">Run Compatibility Check</span></h3>
            <form id="check-form">
                <div class="form-row">
                    <label>
                        <span data-i18n="check.service_label">Service</span>
                        <select id="check-service" required>
                            <option value="" data-i18n="check.select_placeholder">— Select service —</option>
                        </select>
                    </label>
                    <label>
                        <span data-i18n="check.version_label">New Version</span>
                        <input type="text" id="check-version" placeholder="e.g. 2.0.0" required />
                    </label>
                </div>
                <div class="form-hint" id="check-hint"><span data-i18n="check.latest_hint">Latest version</span>: <span id="check-latest-version">—</span></div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="btn-cancel-check" data-i18n="check.cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-i18n="check.submit">Run Check</button>
                </div>
            </form>
            <div class="check-result" id="check-result"></div>
            <div class="check-detail" id="check-detail" style="display:none">
                <div class="detail-summary" id="detail-summary"></div>
                <div class="detail-changes" id="detail-changes"></div>
                <div class="detail-consumers" id="detail-consumers"></div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
